services:
  db:
    image: postgres:16
    container_name: admissions_db
    environment:
      POSTGRES_USER: admissions
      POSTGRES_PASSWORD: admissions
      POSTGRES_DB: admissions
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admissions"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
